<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Security Shield Icon with AA initials -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M50 5 L85 20 L85 45 C85 65 70 85 50 95 C30 85 15 65 15 45 L15 20 Z" 
        fill="url(#grad)" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Lock icon inside shield -->
  <rect x="42" y="50" width="16" height="12" fill="#fff" rx="1"/>
  <path d="M45 50 L45 45 C45 42 47 40 50 40 C53 40 55 42 55 45 L55 50" 
        fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="56" r="2" fill="#1e40af"/>
  
  <!-- AA text at top -->
  <text x="50" y="35" font-family="Arial, sans-serif" font-size="18" 
        font-weight="bold" fill="#fff" text-anchor="middle">AA</text>
</svg>